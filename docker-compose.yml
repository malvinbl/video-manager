services:
  kafka:
    image: apache/kafka:4.1.1
    container_name: video-manager-kafka
    environment:
      KAFKA_NODE_ID: "1"
      KAFKA_PROCESS_ROLES: "broker,controller"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:9093"
      KAFKA_LISTENERS: "PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: "1"
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: "1"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: "0"
    ports:
      - "9092:9092"
      - "19092:19092"
    healthcheck:
      test: [ "CMD-SHELL", "bash -lc 'echo > /dev/tcp/127.0.0.1/9092'" ]
      interval: 10s
      timeout: 5s
      retries: 12

  redis:
    image: redis:7.4-alpine
    container_name: video-manager-redis
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 12

  minio:
    image: minio/minio:RELEASE.2025-02-28T09-55-16Z
    container_name: video-manager-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio-root-user
      MINIO_ROOT_PASSWORD: minio-root-password
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:9000/minio/health/live" ]
      interval: 10s
      timeout: 5s
      retries: 12

  minio-init:
    image: minio/mc:RELEASE.2025-03-12T17-29-24Z
    container_name: video-manager-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 minio-root-user minio-root-password &&
      mc mb --ignore-existing local/bucket
      "
    restart: "no"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: video-manager-app
    depends_on:
      kafka:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_AUTO_OFFSET_RESET: earliest
      REDIS_URI: redis://redis:6379
      VIDEO_MANAGER_S3_ENDPOINT: http://minio:9000
      VIDEO_MANAGER_S3_BUCKET: bucket
      VIDEO_MANAGER_S3_ACCESS_KEY: minio-root-user
      VIDEO_MANAGER_S3_SECRET_KEY: minio-root-password
      LOCAL_WORKSPACE_DIR: /tmp/.videomanager-work
      OBSERVABILITY_PORT: "8081"
    ports:
      - "8081:8081"
    restart: unless-stopped
